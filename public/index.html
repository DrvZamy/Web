<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#080a0a" />
  <meta name="description" content="Website resmi dan store MineFiveID, server Minecraft Survival Economy untuk Java dan Bedrock Edition." />
  <meta property="og:title" content="MineFiveID — Survival Economy" />
  <meta property="og:description" content="Main santai bersama teman di server Minecraft Java & Bedrock MineFiveID." />
  <title>MineFiveID — Survival Economy</title>
  <link rel="icon" href="./assets/minefive-logo.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="scroll-progress" id="scroll-progress" aria-hidden="true"></div>
  <div class="cursor-glow" id="cursor-glow" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>
  <div class="ambient ambient-one" aria-hidden="true"></div>
  <div class="ambient ambient-two" aria-hidden="true"></div>

  <header id="site-header" class="site-header"></header>
  <main id="app" tabindex="-1">
    <section class="page-shell">
      <div class="skeleton hero-skeleton"></div>
      <div class="grid grid-3">
        <div class="skeleton card-skeleton"></div>
        <div class="skeleton card-skeleton"></div>
        <div class="skeleton card-skeleton"></div>
      </div>
    </section>
  </main>
  <footer id="site-footer" class="site-footer"></footer>

  <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>
  <div id="modal-root"></div>

  <script src="./app.js" defer></script>
</body>
</html>
